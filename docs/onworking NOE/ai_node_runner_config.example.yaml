node:
  name: "AI.chat"
  version: "0.1.0"
  router_socket: "/var/run/fluxbee/routers"
  uuid_persistence_dir: "/var/lib/fluxbee/state/nodes"
  config_dir: "/etc/fluxbee"

runtime:
  read_timeout_ms: 30000
  handler_timeout_ms: 60000
  write_timeout_ms: 10000
  queue_capacity: 128
  worker_pool_size: 4
  retry_max_attempts: 3
  retry_initial_backoff_ms: 200
  retry_max_backoff_ms: 2000
  metrics_log_interval_ms: 30000

# behavior.kind: echo | openai_chat
behavior:
  kind: openai_chat
  model: "gpt-4.1-mini"
  model_settings:
    temperature: 0.2
    top_p: 1.0
    max_output_tokens: 256
  # Backward-compatible short form:
  # instructions: "You are a concise support assistant."
  #
  # Configurable strategy form:
  instructions:
    source: inline   # inline | file | env | none
    value: "You are a concise support assistant."
    trim: true
  api_key_env: "OPENAI_API_KEY"
  # base_url: "https://api.openai.com/v1/responses"
