# /etc/json-router/island.yaml (sandbox)
# Template para crear routers nuevos + lista de autorizados

island:
  id: sandbox

defaults:
  paths:
    state_dir: ./state
    node_socket_dir: /tmp/json-router/nodes
    shm_prefix: /jsr-

  timers:
    hello_interval_ms: 10000
    dead_interval_ms: 40000
    heartbeat_interval_ms: 5000
    heartbeat_stale_ms: 30000

routers:
  - name: RT.sandbox.primary
  - name: RT.sandbox.secondary
  - name: RT.sandbox.edge
