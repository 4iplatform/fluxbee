# Configuración completa del router RT.sandbox.edge

router:
  name: RT.sandbox.edge
  island_id: sandbox

paths:
  state_dir: ./state
  node_socket_dir: /var/run/json-router/nodes
  shm_prefix: /jsr-

timers:
  hello_interval_ms: 10000
  dead_interval_ms: 40000
  heartbeat_interval_ms: 5000
  heartbeat_stale_ms: 30000

wan:
  listen: null
  uplinks:
    - address: "127.0.0.1:9100"
      island: sandbox-remote

local_peers:
  shm: []

routing:
  static_routes: []
