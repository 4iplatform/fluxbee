# Configuración completa del router RT.sandbox.primary

router:
  name: RT.sandbox.primary
  island_id: sandbox

paths:
  state_dir: ./state
  node_socket_dir: /var/run/json-router/nodes
  shm_prefix: /jsr-

timers:
  hello_interval_ms: 10000
  dead_interval_ms: 40000
  heartbeat_interval_ms: 5000
  heartbeat_stale_ms: 30000

wan:
  listen: "127.0.0.1:9000"
  uplinks:
    - address: "127.0.0.1:9001"

local_peers:
  shm: []

routing:
  static_routes:
    - pattern: "WF.echo"
      match_kind: exact
      next_hop_router: "1339a101-f9b0-4050-9e3c-790b444a34da"
      link_id: 1
