hive_id: "motherbee"
role: motherbee

# WAN / inter-hive gateway.
wan:
  listen: "0.0.0.0:9000"
  gateway_name: "RT.gateway"
  uplinks:
    - address: "192.168.8.220:9000"

# Local NATS broker for control/data plane.
nats:
  mode: embedded
  port: 4222

# Local admin HTTP API.
admin:
  listen: "127.0.0.1:8080"

# Local architect HTTP UI/API (typically exposed through reverse proxy).
architect:
  listen: "127.0.0.1:3000"

# Shared filesystem root used by admin/orchestrator.
storage:
  path: "/var/lib/fluxbee"

# Base PostgreSQL connection.
# Runtime DB names are fixed by code:
# - SY.identity -> fluxbee_identity
# - SY.storage  -> fluxbee_storage
# `database.url` is still kept for SY.identity.
# SY.storage no longer reads this field.
# Preferred path for SY.storage: CONFIG_SET -> local secrets.json -> restart sy-storage.
database:
  url: "postgresql://fluxbee_sa:magicAI@127.0.0.1:5432/fluxbee"

# Identity runtime settings.
identity:
  default_tenant: "fluxbee"
  sync:
    port: 9100

# Government/frontdesk wiring.
government:
  identity_frontdesk: "AI.frontdesk.gov@motherbee"

# Blob runtime config.
blob:
  enabled: true
  path: "/var/lib/fluxbee/blob"
  sync:
    enabled: true
    tool: "syncthing"
    api_port: 8384
    data_dir: "/var/lib/fluxbee/syncthing"

# Runtime artifact distribution config.
dist:
  path: "/var/lib/fluxbee/dist"
  sync:
    enabled: true
    tool: "syncthing"
