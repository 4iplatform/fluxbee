island_id: "sandbox"
role: mother

# WAN (gateway). Optional: remove block if no inter-island connectivity.
wan:
  listen: "0.0.0.0:9000"
  gateway_name: "RT.gateway"
  uplinks:
    - address: "192.168.8.220:9000"
  authorized_islands:
    - prod

# Admin API (optional).
admin:
  listen: "127.0.0.1:8080"
