[package]
name = "json-router"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.37", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
uuid = { version = "1.7", features = ["v4", "serde"] }
memmap2 = "0.9"
nix = { version = "0.28", features = ["fs", "mman"] }
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
