[package]
name = "json-router"
version = "0.1.0"
edition = "2021"

[workspace]
resolver = "2"
members = [
  "node-lib",
  "examples/node-ai",
  "examples/node-io",
  "examples/node-wf",
  "examples/node-stub",
]

[dependencies]
bytes = "1.11.0"
memmap2 = "0.9.9"
nix = { version = "0.30.1", features = ["socket", "fs", "net", "mman"] }
node-lib = { path = "node-lib" }
raw_sync = "0.1.5"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yaml = "0.9.34"
thiserror = "2.0.17"
tokio = { version = "1.49.0", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
uuid = { version = "1.19.0", features = ["v4", "serde"] }
wasmtime = "40.0.2"
chrono = { version = "0.4.41", default-features = false, features = ["clock"] }
hyper = { version = "0.14.32", features = ["full"] }
urlencoding = "2.1.3"
